name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Update existing release
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          PREV_TAG=$(gh release list --limit 100 --json tagName,publishedAt -q \
            '[.[] | select(.tagName != "'"$TAG"'")] | sort_by(.publishedAt) | last | .tagName' 2>/dev/null || echo "")

          {
            echo "## What's Changed"
            echo ""
            if [ -z "$PREV_TAG" ]; then
              gh log --oneline -20
            else
              gh log "${PREV_TAG}..HEAD" --oneline
            fi
          } > /tmp/release_notes.md

          gh release edit "$TAG" --notes-file /tmp/release_notes.md
