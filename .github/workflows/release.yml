name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version from package.json
        id: version
        run: |
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git fetch --tags --force

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          TAG="${{ steps.version.outputs.tag }}"

          echo "Current tag: $TAG"

          PREV_TAG=$(gh release list \
            --limit 100 \
            --json tagName,publishedAt \
            --jq '[.[] | select(.tagName != "'"$TAG"'")] | sort_by(.publishedAt) | last | .tagName')

          echo "Previous tag: ${PREV_TAG:-None}"

          {
            echo "## What's Changed"
            echo ""

            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "null" ]; then
              git log --pretty=format:"- %s (%h)" -20
            else
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)"
            fi
          } > release_notes.md

          echo "Generated release notes:"
          cat release_notes.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing release..."

            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file release_notes.md

          else
            echo "Creating new release..."

            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release_notes.md
          fi